<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>construct · dark site manager</title>
    <!-- Chart.js & html2canvas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0b0f17;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .app {
            display: flex;
            width: 100%;
            max-width: 1500px;
            background: #10141e;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            margin: 16px;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid #2a2f3c;
        }
        /* sidebar */
        .sidebar {
            width: 260px;
            background: #0c0f17;
            padding: 28px 16px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #262b36;
        }
        .sidebar h2 {
            font-weight: 500;
            font-size: 1.5rem;
            letter-spacing: 0.5px;
            margin-bottom: 40px;
            padding-left: 12px;
            color: #e0e6f0;
            border-left: 4px solid #3b82f6;
        }
        .nav-item {
            padding: 12px 18px;
            margin: 6px 0;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 14px;
            color: #9aa8b9;
        }
        .nav-item:hover {
            background: #1e2636;
            color: #eef4ff;
        }
        .nav-item.active {
            background: #1e4a7a;
            color: white;
            box-shadow: 0 6px 14px #0e2a3e;
        }
        .footer-side {
            margin-top: auto;
            font-size: 0.85rem;
            text-align: center;
            color: #5d6e88;
            border-top: 1px solid #202634;
            padding-top: 24px;
        }
        .footer-side a {
            color: #8fadf0;
            text-decoration: none;
        }
        /* main content */
        .main {
            flex: 1;
            background: #121724;
            padding: 28px 32px;
            overflow-y: auto;
            max-height: 90vh;
            color: #e3e9f2;
        }
        .site-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .site-selector {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #1c2332;
            padding: 8px 20px 8px 24px;
            border-radius: 48px;
            border: 1px solid #2f384b;
        }
        .site-selector label {
            font-weight: 500;
            color: #b5c6e0;
        }
        #siteSelect {
            background: #0e141f;
            color: white;
            border: 1px solid #34455c;
            padding: 10px 24px 10px 16px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            min-width: 220px;
        }
        .btn {
            background: #2b3b58;
            color: #f0f6ff;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #40536d;
        }
        .btn-primary {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2569d6;
            box-shadow: 0 8px 16px #0f2b50;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #475e7c;
            color: #ccddfa;
        }
        .btn-outline:hover {
            background: #1f2c40;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 22px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #1a2332;
            padding: 24px 20px;
            border-radius: 26px;
            border: 1px solid #2f3b50;
            box-shadow: 0 6px 0 #0b101a;
        }
        .stat-card h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #a1b3cf;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 2.4rem;
            font-weight: 700;
            color: #ebf2ff;
        }
        .action-card {
            background: #1b2333;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid #2e3b4f;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
            align-items: flex-end;
        }
        .form-group {
            flex: 1 1 160px;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #9fb0d0;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #2c3a54;
            border-radius: 24px;
            font-size: 0.95rem;
            color: #e3ecff;
            transition: 0.15s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px #1e3a5f;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a2332;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 0 #0d121e;
        }
        th {
            background: #222d42;
            text-align: left;
            padding: 18px 18px;
            font-weight: 600;
            color: #cbddfa;
            font-size: 0.85rem;
        }
        td {
            padding: 16px 18px;
            border-bottom: 1px solid #28344a;
            color: #dee9fc;
        }
        .badge {
            background: #27496e;
            color: #b8d6ff;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
        }
        .action-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            margin: 0 5px;
            color: #9cb1d4;
        }
        .action-btn:hover {
            color: #3b82f6;
        }
        .delete-btn:hover {
            color: #f87171;
        }
        /* attendance month table */
        .attendance-month-table {
            overflow-x: auto;
            margin-top: 20px;
        }
        .attendance-month-table table {
            min-width: 800px;
        }
        .attendance-month-table th, .attendance-month-table td {
            text-align: center;
            vertical-align: middle;
        }
        .attendance-month-table td {
            cursor: pointer;
            font-weight: 600;
            transition: 0.1s;
        }
        .attendance-month-table td.present {
            background: #1a4731;
            color: #a7f3d0;
        }
        .attendance-month-table td.absent {
            background: #4c1e1e;
            color: #fecaca;
        }
        .attendance-month-table td.half {
            background: #7b5e1a;
            color: #fde68a;
        }
        .attendance-month-table td:hover {
            filter: brightness(1.3);
        }
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.show {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: #1e2841;
            padding: 32px;
            border-radius: 40px;
            width: 90%;
            max-width: 550px;
            border: 1px solid #3a4b6e;
            box-shadow: 0 30px 50px #04060b;
        }
        .modal-content h3 {
            color: white;
            margin-bottom: 24px;
        }
        .modal-close {
            float: right;
            font-size: 1.8rem;
            cursor: pointer;
            color: #8b9dbf;
        }
        .worker-chart-container {
            max-width: 300px;
            margin: 20px auto;
        }
        hr {
            border: 0.5px solid #2f405b;
            margin: 20px 0;
        }
        .import-export {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }
        .footer-main {
            margin-top: 30px;
            color: #5d7395;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- sidebar navigation -->
    <div class="sidebar">
        <h2>⛑️ SITEHUB</h2>
        <div class="nav-item active" data-page="siteDashboard">🏠 Site Dashboard</div>
        <div class="nav-item" data-page="workers">👥 Workers</div>
        <div class="nav-item" data-page="attendance">📋 Attendance</div>
        <div class="nav-item" data-page="materials">🧱 Materials</div>
        <div class="nav-item" data-page="reports">📄 Reports</div>
        <div class="nav-item" data-page="sites">📌 Manage Sites</div>
        <div class="nav-item" data-page="settings">⚙️ Settings</div>
        <div class="footer-side">
            Made by <a href="https://rs.zenuxs.in" target="_blank">Rishabh</a><br> rs.zenuxs.in
        </div>
    </div>
    <!-- main area -->
    <div class="main" id="main-content">
        <!-- site selector header (dynamic) -->
        <div class="site-header" id="siteHeader"></div>
        <!-- page content container -->
        <div id="pageContent"></div>
    </div>
</div>

<!-- generic edit modal (hidden) -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <span class="modal-close" id="modalClose">&times;</span>
        <h3 id="modalTitle">Edit</h3>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    (function() {
        // ---------- data keys ----------
        const STORAGE_KEYS = {
            SITES: 'cs_sites',
            WORKERS: 'cs_workers',
            ATTENDANCE: 'cs_attendance',
            REPORTS: 'cs_reports',
            MATERIALS: 'cs_materials'
        };

        // ---------- initial data ----------
        let sites = JSON.parse(localStorage.getItem(STORAGE_KEYS.SITES)) || [];
        let workers = JSON.parse(localStorage.getItem(STORAGE_KEYS.WORKERS)) || [];
        let attendance = JSON.parse(localStorage.getItem(STORAGE_KEYS.ATTENDANCE)) || [];
        let reports = JSON.parse(localStorage.getItem(STORAGE_KEYS.REPORTS)) || [];
        let materials = JSON.parse(localStorage.getItem(STORAGE_KEYS.MATERIALS)) || [];

        materials = materials.map(m => ({ siteId: m.siteId || (sites[0]?.id || 'unknown'), ...m }));
        reports = reports.map(r => ({ siteId: r.siteId || (sites[0]?.id || 'unknown'), ...r }));

        let currentSiteId = sites.length > 0 ? sites[0].id : null;

        // modal control
        const modal = document.getElementById('editModal');
        const modalClose = document.getElementById('modalClose');
        modalClose.onclick = () => modal.classList.remove('show');
        window.onclick = (e) => { if (e.target === modal) modal.classList.remove('show'); };

        function saveAll() {
            localStorage.setItem(STORAGE_KEYS.SITES, JSON.stringify(sites));
            localStorage.setItem(STORAGE_KEYS.WORKERS, JSON.stringify(workers));
            localStorage.setItem(STORAGE_KEYS.ATTENDANCE, JSON.stringify(attendance));
            localStorage.setItem(STORAGE_KEYS.REPORTS, JSON.stringify(reports));
            localStorage.setItem(STORAGE_KEYS.MATERIALS, JSON.stringify(materials));
        }

        function genId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 10); }

        function getWorkerAttendanceStats(workerId) {
            let present = 0, absent = 0, half = 0;
            attendance.filter(a => a.workerId === workerId).forEach(a => {
                if (a.status === 'present') present++;
                else if (a.status === 'absent') absent++;
                else if (a.status === 'half') half++;
            });
            return { present, absent, half };
        }

        function getWorkerPending(worker) {
            const stats = getWorkerAttendanceStats(worker.id);
            const days = stats.present + (stats.half * 0.5);
            const earned = days * (worker.dailySalary || 0);
            const advance = worker.advancePaid || 0;
            return Math.max(0, earned - advance);
        }

        function totalPendingBySite(siteId) {
            return workers.filter(w => w.siteId === siteId).reduce((sum, w) => sum + getWorkerPending(w), 0);
        }

        function materialExpensesBySite(siteId) {
            return materials.filter(m => m.siteId === siteId).reduce((acc, m) => acc + (m.subtotal || 0), 0);
        }

        function absentTodayBySite(siteId) {
            const today = new Date().toISOString().split('T')[0];
            return attendance.filter(a => a.siteId === siteId && a.date === today && a.status === 'absent').length;
        }

        function renderSiteHeader() {
            const headerDiv = document.getElementById('siteHeader');
            let options = '<option value="">-- no site --</option>';
            sites.forEach(s => options += `<option value="${s.id}" ${s.id === currentSiteId ? 'selected' : ''}>${s.name}</option>`);
            headerDiv.innerHTML = `
                <div class="site-selector">
                    <label>📍 Current site</label>
                    <select id="siteSelect">${options}</select>
                    <button class="btn-outline btn" id="refreshSiteData" style="padding:8px 20px;">⟳</button>
                </div>
                <button class="btn-primary btn" id="goToManageSites">➕ Manage sites</button>
            `;
            document.getElementById('siteSelect')?.addEventListener('change', (e) => {
                currentSiteId = e.target.value || null;
                renderCurrentPage();
            });
            document.getElementById('refreshSiteData')?.addEventListener('click', () => renderCurrentPage());
            document.getElementById('goToManageSites')?.addEventListener('click', () => {
                setActivePage('sites');
                renderPage('sites');
            });
        }

        let currentPage = 'siteDashboard';
        function setActivePage(page) {
            currentPage = page;
            document.querySelectorAll('.nav-item').forEach(el => {
                const p = el.dataset.page;
                if (p === page) el.classList.add('active');
                else el.classList.remove('active');
            });
        }

        function renderCurrentPage() {
            renderPage(currentPage);
        }

        function renderPage(page) {
            setActivePage(page);
            renderSiteHeader();
            const container = document.getElementById('pageContent');
            if (!container) return;

            if (page === 'siteDashboard') renderSiteDashboard(container);
            else if (page === 'workers') renderWorkers(container);
            else if (page === 'attendance') renderAttendance(container);
            else if (page === 'materials') renderMaterials(container);
            else if (page === 'reports') renderReports(container);
            else if (page === 'sites') renderSitesManagement(container);
            else if (page === 'settings') renderSettings(container);
        }

        // ---------- SITE DASHBOARD ----------
        function renderSiteDashboard(container) {
            if (!currentSiteId || !sites.find(s => s.id === currentSiteId)) {
                container.innerHTML = `<div class="action-card">⚠️ Select or create a site first.</div>`;
                return;
            }
            const site = sites.find(s => s.id === currentSiteId);
            const totalWorkers = workers.filter(w => w.siteId === currentSiteId).length;
            const absentToday = absentTodayBySite(currentSiteId);
            const materialTotal = materialExpensesBySite(currentSiteId);
            const pendingSalary = totalPendingBySite(currentSiteId);

            container.innerHTML = `
                <div class="page-header" style="display:flex; justify-content: space-between;"><h1>📊 ${site.name} dashboard</h1></div>
                <div class="card-grid">
                    <div class="stat-card"><h3>Total workers</h3><div class="value">${totalWorkers}</div></div>
                    <div class="stat-card"><h3>Absent today</h3><div class="value">${absentToday}</div></div>
                    <div class="stat-card"><h3>Material expenses</h3><div class="value">₹${materialTotal.toLocaleString()}</div></div>
                    <div class="stat-card"><h3>Pending salary</h3><div class="value">₹${pendingSalary.toLocaleString()}</div></div>
                </div>
                <div style="display: flex; gap:20px; flex-wrap:wrap;">
                    <canvas id="siteChart" width="400" height="200" style="background:#1b2333; border-radius:24px; padding:10px;"></canvas>
                </div>
                <p class="footer-main">🔍 Site summary – all data local.</p>
            `;
            const allWorkers = workers.filter(w => w.siteId === currentSiteId);
            let totalPresent = 0, totalAbsent = 0, totalHalf = 0;
            allWorkers.forEach(w => {
                const stats = getWorkerAttendanceStats(w.id);
                totalPresent += stats.present;
                totalAbsent += stats.absent;
                totalHalf += stats.half;
            });
            setTimeout(() => {
                const ctx = document.getElementById('siteChart')?.getContext('2d');
                if (ctx) {
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['Present', 'Absent', 'Half day'],
                            datasets: [{
                                label: 'Attendance counts',
                                data: [totalPresent, totalAbsent, totalHalf],
                                backgroundColor: ['#22c55e', '#ef4444', '#f59e0b']
                            }]
                        },
                        options: { responsive: true, plugins: { legend: { labels: { color: '#ccc' } } } }
                    });
                }
            }, 50);
        }

        // ---------- WORKERS (with edit, chart modal) ----------
        function renderWorkers(container) {
            if (!currentSiteId) { container.innerHTML = `<div class="action-card">⚠️ No site selected</div>`; return; }
            const siteWorkers = workers.filter(w => w.siteId === currentSiteId);
            const rows = siteWorkers.map(w => {
                const pending = getWorkerPending(w);
                return `<tr>
                    <td>${w.name}</td><td>${w.role}</td><td>₹${w.dailySalary}</td><td>${w.phone}</td><td>₹${w.advancePaid || 0}</td>
                    <td>₹${pending}</td>
                    <td>
                        <button class="action-btn" data-workerstats='${JSON.stringify(w)}' onclick="openWorkerStats('${w.id}')">📊</button>
                        <button class="action-btn" data-editworker='${w.id}' >✏️</button>
                        <button class="action-btn delete-btn" data-deleteworker='${w.id}' >🗑️</button>
                    </td>
                </tr>`;
            }).join('');

            container.innerHTML = `
                <div class="action-card">
                    <h3>➕ Add worker to ${sites.find(s=>s.id===currentSiteId)?.name}</h3>
                    <div class="form-row">
                        <div class="form-group"><label>Name</label><input id="workerName"></div>
                        <div class="form-group"><label>Role</label><input id="workerRole"></div>
                        <div class="form-group"><label>Daily wage</label><input id="workerSalary" type="number" value="0"></div>
                        <div class="form-group"><label>Phone</label><input id="workerPhone"></div>
                        <div class="form-group"><label>Advance paid</label><input id="workerAdvance" type="number" value="0"></div>
                        <button class="btn-primary btn" id="addWorkerBtn">Add</button>
                    </div>
                </div>
                <table>
                    <thead><tr><th>Name</th><th>Role</th><th>Daily</th><th>Phone</th><th>Advance</th><th>Pending</th><th>Actions</th></tr></thead>
                    <tbody>${rows || '<tr><td colspan="7">No workers</td></tr>'}</tbody>
                </table>
            `;

            document.getElementById('addWorkerBtn')?.addEventListener('click', () => {
                const name = document.getElementById('workerName')?.value.trim();
                if (!name) return alert('Name required');
                const newWorker = {
                    id: genId(), siteId: currentSiteId,
                    name, role: document.getElementById('workerRole')?.value,
                    dailySalary: parseFloat(document.getElementById('workerSalary')?.value) || 0,
                    phone: document.getElementById('workerPhone')?.value,
                    advancePaid: parseFloat(document.getElementById('workerAdvance')?.value) || 0,
                };
                workers.push(newWorker); saveAll(); renderWorkers(container);
            });

            document.querySelectorAll('[data-deleteworker]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.deleteworker;
                    workers = workers.filter(w => w.id !== id);
                    attendance = attendance.filter(a => a.workerId !== id);
                    saveAll(); renderWorkers(container);
                });
            });
            document.querySelectorAll('[data-editworker]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.editworker;
                    const worker = workers.find(w => w.id === id);
                    if (!worker) return;
                    showEditModal('Edit Worker', `
                        <div class="form-group"><label>Name</label><input id="editName" value="${worker.name}"></div>
                        <div class="form-group"><label>Role</label><input id="editRole" value="${worker.role || ''}"></div>
                        <div class="form-group"><label>Daily salary</label><input id="editSalary" type="number" value="${worker.dailySalary}"></div>
                        <div class="form-group"><label>Phone</label><input id="editPhone" value="${worker.phone || ''}"></div>
                        <div class="form-group"><label>Advance</label><input id="editAdvance" type="number" value="${worker.advancePaid || 0}"></div>
                        <button class="btn-primary" id="saveEditWorker">Update</button>
                    `);
                    document.getElementById('saveEditWorker')?.addEventListener('click', () => {
                        worker.name = document.getElementById('editName')?.value;
                        worker.role = document.getElementById('editRole')?.value;
                        worker.dailySalary = parseFloat(document.getElementById('editSalary')?.value) || 0;
                        worker.phone = document.getElementById('editPhone')?.value;
                        worker.advancePaid = parseFloat(document.getElementById('editAdvance')?.value) || 0;
                        saveAll(); modal.classList.remove('show'); renderWorkers(container);
                    });
                });
            });
        }

        window.openWorkerStats = function(workerId) {
            const worker = workers.find(w => w.id === workerId);
            if (!worker) return;
            const stats = getWorkerAttendanceStats(workerId);
            const modal = document.getElementById('editModal');
            document.getElementById('modalTitle').innerText = `${worker.name} attendance`;
            document.getElementById('modalBody').innerHTML = `
                <div style="color:#ddd;">Present: ${stats.present} | Absent: ${stats.absent} | Half: ${stats.half}</div>
                <div class="worker-chart-container"><canvas id="workerChart"></canvas></div>
                <button class="btn-outline" id="closeModalBtn">Close</button>
            `;
            modal.classList.add('show');
            document.getElementById('closeModalBtn').onclick = () => modal.classList.remove('show');
            setTimeout(() => {
                const ctx = document.getElementById('workerChart')?.getContext('2d');
                if (ctx) {
                    new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Present', 'Absent', 'Half'],
                            datasets: [{
                                data: [stats.present, stats.absent, stats.half],
                                backgroundColor: ['#22c55e', '#ef4444', '#f59e0b']
                            }]
                        }
                    });
                }
            }, 50);
        };

        // ---------- ATTENDANCE (month view with export & inline edit) ----------
        function renderAttendance(container) {
            if (!currentSiteId) {
                container.innerHTML = `<div class="action-card">⚠️ No site selected</div>`;
                return;
            }
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const defaultMonth = `${year}-${month}`;

            container.innerHTML = `
                <div class="action-card">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Select month</label>
                            <input type="month" id="attMonth" value="${defaultMonth}">
                        </div>
                        <button class="btn-primary" id="loadMonthBtn">Load month</button>
                        <button class="btn-outline" id="exportAttendanceImg">📸 Export as image</button>
                    </div>
                    <div id="monthAttendanceContainer" class="attendance-month-table"></div>
                </div>
            `;

            function loadMonth() {
                const monthStr = document.getElementById('attMonth')?.value;
                if (!monthStr) return;
                const [year, month] = monthStr.split('-').map(Number);
                const date = new Date(year, month, 0); // last day of month
                const daysInMonth = date.getDate();
                const dates = [];
                for (let d = 1; d <= daysInMonth; d++) {
                    const y = year;
                    const m = String(month).padStart(2, '0');
                    const day = String(d).padStart(2, '0');
                    dates.push(`${y}-${m}-${day}`);
                }

                const siteWorkers = workers.filter(w => w.siteId === currentSiteId);
                if (siteWorkers.length === 0) {
                    document.getElementById('monthAttendanceContainer').innerHTML = '<p>No workers for this site.</p>';
                    return;
                }

                // Build a map for quick lookup: workerId -> date -> status
                const attMap = {};
                attendance.forEach(a => {
                    if (a.siteId === currentSiteId && dates.includes(a.date)) {
                        if (!attMap[a.workerId]) attMap[a.workerId] = {};
                        attMap[a.workerId][a.date] = a.status;
                    }
                });

                let html = '<table><thead><tr><th>Worker</th>';
                dates.forEach(d => {
                    const [y,m,day] = d.split('-');
                    html += `<th>${day}/${m}</th>`;
                });
                html += '</tr></thead><tbody>';

                siteWorkers.forEach(w => {
                    html += '<tr>';
                    html += `<td style="text-align:left; font-weight:600;">${w.name}</td>`;
                    dates.forEach(date => {
                        const status = attMap[w.id]?.[date] || 'absent'; // default absent
                        let statusClass = '';
                        if (status === 'present') statusClass = 'present';
                        else if (status === 'absent') statusClass = 'absent';
                        else if (status === 'half') statusClass = 'half';
                        const letter = status === 'present' ? 'P' : (status === 'half' ? 'H' : 'A');
                        html += `<td class="${statusClass}" data-workerid="${w.id}" data-date="${date}" data-status="${status}">${letter}</td>`;
                    });
                    html += '</tr>';
                });
                html += '</tbody></table>';
                document.getElementById('monthAttendanceContainer').innerHTML = html;

                // Add click handlers for each cell to cycle status
                document.querySelectorAll('#monthAttendanceContainer td[data-workerid]').forEach(cell => {
                    cell.addEventListener('click', (e) => {
                        const workerId = cell.dataset.workerid;
                        const date = cell.dataset.date;
                        const current = cell.dataset.status;
                        // cycle: present -> absent -> half -> present ...
                        let next = 'present';
                        if (current === 'present') next = 'absent';
                        else if (current === 'absent') next = 'half';
                        else if (current === 'half') next = 'present';

                        // Update attendance array
                        // remove old record for this worker+date
                        attendance = attendance.filter(a => !(a.workerId === workerId && a.date === date));
                        attendance.push({ id: genId(), siteId: currentSiteId, workerId, date, status: next });
                        saveAll();

                        // Update cell appearance
                        cell.dataset.status = next;
                        cell.className = '';
                        if (next === 'present') {
                            cell.classList.add('present');
                            cell.innerText = 'P';
                        } else if (next === 'absent') {
                            cell.classList.add('absent');
                            cell.innerText = 'A';
                        } else {
                            cell.classList.add('half');
                            cell.innerText = 'H';
                        }
                    });
                });
            }

            document.getElementById('loadMonthBtn')?.addEventListener('click', loadMonth);
            document.getElementById('exportAttendanceImg')?.addEventListener('click', () => {
                const container = document.getElementById('monthAttendanceContainer');
                if (!container.children.length) {
                    alert('Load a month first');
                    return;
                }
                html2canvas(container).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `attendance-${currentSiteId}-${document.getElementById('attMonth').value}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                });
            });

            // Auto-load current month on first render
            setTimeout(loadMonth, 50);
        }

        // ---------- MATERIALS (per site) ----------
        function renderMaterials(container) {
            if (!currentSiteId) return;
            const siteMaterials = materials.filter(m => m.siteId === currentSiteId);
            const rows = siteMaterials.map(m => `<tr>
                <td>${m.itemName}</td><td>${m.quantity}</td><td>₹${m.pricePerUnit}</td><td>₹${m.subtotal}</td><td>${m.purchaseDate || ''}</td>
                <td><button class="action-btn" data-editmat="${m.id}">✏️</button><button class="action-btn delete-btn" data-deletemat="${m.id}">🗑️</button></td>
            </tr>`).join('');
            container.innerHTML = `
                <div class="action-card">
                    <h3>➕ Add material</h3>
                    <div class="form-row">
                        <div class="form-group"><label>Item</label><input id="matName"></div>
                        <div class="form-group"><label>Qty</label><input id="matQty" type="number" value="1"></div>
                        <div class="form-group"><label>Price/unit</label><input id="matPrice" type="number" value="0"></div>
                        <div class="form-group"><label>Date</label><input id="matDate" type="date"></div>
                        <button class="btn-primary" id="addMatBtn">Add</button>
                    </div>
                </div>
                <table><thead><tr><th>Item</th><th>Qty</th><th>Price/unit</th><th>Subtotal</th><th>Date</th><th>Actions</th></tr></thead>
                <tbody>${rows || '<tr><td colspan="6">No materials</td></tr>'}</tbody></table>
            `;
            document.getElementById('addMatBtn')?.addEventListener('click', () => {
                const name = document.getElementById('matName')?.value.trim();
                if (!name) return;
                const qty = parseFloat(document.getElementById('matQty')?.value) || 0;
                const price = parseFloat(document.getElementById('matPrice')?.value) || 0;
                materials.push({
                    id: genId(), siteId: currentSiteId,
                    itemName: name, quantity: qty, pricePerUnit: price,
                    subtotal: qty * price, purchaseDate: document.getElementById('matDate')?.value
                });
                saveAll(); renderMaterials(container);
            });
            document.querySelectorAll('[data-deletemat]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    materials = materials.filter(m => m.id !== e.target.dataset.deletemat);
                    saveAll(); renderMaterials(container);
                });
            });
            document.querySelectorAll('[data-editmat]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.editmat;
                    const mat = materials.find(m => m.id === id);
                    if (!mat) return;
                    showEditModal('Edit Material', `
                        <div class="form-group"><label>Item</label><input id="editMatName" value="${mat.itemName}"></div>
                        <div class="form-group"><label>Qty</label><input id="editMatQty" type="number" value="${mat.quantity}"></div>
                        <div class="form-group"><label>Price/unit</label><input id="editMatPrice" type="number" value="${mat.pricePerUnit}"></div>
                        <div class="form-group"><label>Date</label><input id="editMatDate" type="date" value="${mat.purchaseDate || ''}"></div>
                        <button class="btn-primary" id="saveEditMat">Update</button>
                    `);
                    document.getElementById('saveEditMat')?.addEventListener('click', () => {
                        mat.itemName = document.getElementById('editMatName')?.value;
                        mat.quantity = parseFloat(document.getElementById('editMatQty')?.value) || 0;
                        mat.pricePerUnit = parseFloat(document.getElementById('editMatPrice')?.value) || 0;
                        mat.subtotal = mat.quantity * mat.pricePerUnit;
                        mat.purchaseDate = document.getElementById('editMatDate')?.value;
                        saveAll(); modal.classList.remove('show'); renderMaterials(container);
                    });
                });
            });
        }

        function showEditModal(title, bodyHtml) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerHTML = bodyHtml;
            modal.classList.add('show');
        }

        // REPORTS (per site)
        function renderReports(container) {
            if (!currentSiteId) return;
            const siteReports = reports.filter(r => r.siteId === currentSiteId);
            const rows = siteReports.map(r => `<tr><td>${r.date}</td><td>${r.description}</td><td>${r.issues || ''}</td>
                <td><button class="action-btn" data-editreport="${r.id}">✏️</button><button class="delete-btn action-btn" data-deletereport="${r.id}">🗑️</button></td></tr>`).join('');
            container.innerHTML = `
                <div class="action-card">
                    <h3>➕ Add daily report</h3>
                    <div class="form-row">
                        <div class="form-group"><label>Date</label><input id="repDate" type="date"></div>
                        <div class="form-group"><label>Description</label><input id="repDesc"></div>
                        <div class="form-group"><label>Issues</label><input id="repIssues"></div>
                        <button class="btn-primary" id="addReportBtn">Add</button>
                    </div>
                </div>
                <table><thead><tr><th>Date</th><th>Work done</th><th>Issues</th><th>Actions</th></tr></thead>
                <tbody>${rows || '<tr><td colspan="4">No reports</td></tr>'}</tbody></table>
            `;
            document.getElementById('addReportBtn')?.addEventListener('click', () => {
                reports.push({
                    id: genId(), siteId: currentSiteId,
                    date: document.getElementById('repDate')?.value,
                    description: document.getElementById('repDesc')?.value,
                    issues: document.getElementById('repIssues')?.value,
                });
                saveAll(); renderReports(container);
            });
            document.querySelectorAll('[data-deletereport]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    reports = reports.filter(r => r.id !== e.target.dataset.deletereport);
                    saveAll(); renderReports(container);
                });
            });
        }

        // SITES management (with edit)
        function renderSitesManagement(container) {
            const rows = sites.map(s => `<tr>
                <td>${s.name}</td><td>${s.location || ''}</td><td>${s.startDate || ''}</td><td>${s.contractor || ''}</td><td>${s.notes || ''}</td>
                <td><button class="action-btn" data-editsite="${s.id}">✏️</button><button class="delete-btn action-btn" data-deletesite="${s.id}">🗑️</button></td>
            </tr>`).join('');
            container.innerHTML = `
                <div class="action-card">
                    <h3>➕ Create new site</h3>
                    <div class="form-row">
                        <div class="form-group"><label>Name</label><input id="siteName"></div>
                        <div class="form-group"><label>Location</label><input id="siteLocation"></div>
                        <div class="form-group"><label>Start date</label><input id="siteStart" type="date"></div>
                        <div class="form-group"><label>Contractor</label><input id="siteContractor"></div>
                        <div class="form-group"><label>Notes</label><input id="siteNotes"></div>
                        <button class="btn-primary" id="addSiteBtn">Add site</button>
                    </div>
                </div>
                <table><thead><tr><th>Name</th><th>Location</th><th>Start</th><th>Contractor</th><th>Notes</th><th>Actions</th></tr></thead>
                <tbody>${rows || '<tr><td colspan="6">No sites</td></tr>'}</tbody></table>
            `;
            document.getElementById('addSiteBtn')?.addEventListener('click', () => {
                const name = document.getElementById('siteName')?.value.trim();
                if (!name) return alert('Name required');
                const newSite = { id: genId(), name,
                    location: document.getElementById('siteLocation')?.value,
                    startDate: document.getElementById('siteStart')?.value,
                    contractor: document.getElementById('siteContractor')?.value,
                    notes: document.getElementById('siteNotes')?.value
                };
                sites.push(newSite); saveAll(); renderSitesManagement(container);
                if (!currentSiteId) { currentSiteId = newSite.id; renderSiteHeader(); }
            });
            document.querySelectorAll('[data-deletesite]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.deletesite;
                    sites = sites.filter(s => s.id !== id);
                    workers = workers.filter(w => w.siteId !== id);
                    attendance = attendance.filter(a => a.siteId !== id);
                    materials = materials.filter(m => m.siteId !== id);
                    reports = reports.filter(r => r.siteId !== id);
                    if (currentSiteId === id) currentSiteId = sites[0]?.id || null;
                    saveAll(); renderSitesManagement(container); renderSiteHeader();
                });
            });
            document.querySelectorAll('[data-editsite]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.editsite;
                    const site = sites.find(s => s.id === id);
                    if (!site) return;
                    showEditModal('Edit Site', `
                        <div class="form-group"><label>Name</label><input id="editSiteName" value="${site.name}"></div>
                        <div class="form-group"><label>Location</label><input id="editSiteLocation" value="${site.location || ''}"></div>
                        <div class="form-group"><label>Start date</label><input id="editSiteStart" type="date" value="${site.startDate || ''}"></div>
                        <div class="form-group"><label>Contractor</label><input id="editSiteContractor" value="${site.contractor || ''}"></div>
                        <div class="form-group"><label>Notes</label><input id="editSiteNotes" value="${site.notes || ''}"></div>
                        <button class="btn-primary" id="saveEditSite">Update</button>
                    `);
                    document.getElementById('saveEditSite')?.addEventListener('click', () => {
                        site.name = document.getElementById('editSiteName')?.value;
                        site.location = document.getElementById('editSiteLocation')?.value;
                        site.startDate = document.getElementById('editSiteStart')?.value;
                        site.contractor = document.getElementById('editSiteContractor')?.value;
                        site.notes = document.getElementById('editSiteNotes')?.value;
                        saveAll(); modal.classList.remove('show'); renderSitesManagement(container); renderSiteHeader();
                    });
                });
            });
        }

        // SETTINGS
        function renderSettings(container) {
            container.innerHTML = `
                <div class="page-header"><h1>⚙️ Settings</h1></div>
                <div class="action-card">
                    <h3>📤 Export all data</h3>
                    <button class="btn-primary" id="exportBtn">Download JSON</button>
                </div>
                <div class="action-card">
                    <h3>📥 Import data (overwrites)</h3>
                    <input type="file" id="importFile" accept=".json">
                    <button class="btn" id="importBtn">Restore</button>
                </div>
                <div class="footer-main">Made by Rishabh · rs.zenuxs.in</div>
            `;
            document.getElementById('exportBtn')?.addEventListener('click', () => {
                const exportData = { sites, workers, attendance, reports, materials };
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob); a.download = 'site-backup.json'; a.click();
            });
            document.getElementById('importBtn')?.addEventListener('click', () => {
                const file = document.getElementById('importFile').files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.sites) sites = data.sites;
                        if (data.workers) workers = data.workers;
                        if (data.attendance) attendance = data.attendance;
                        if (data.reports) reports = data.reports;
                        if (data.materials) materials = data.materials;
                        saveAll();
                        currentSiteId = sites[0]?.id || null;
                        renderCurrentPage();
                        alert('Import successful');
                    } catch { alert('Invalid JSON'); }
                };
                reader.readAsText(file);
            });
        }

        document.querySelectorAll('.nav-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const page = e.target.closest('.nav-item').dataset.page;
                renderPage(page);
            });
        });

        renderPage('siteDashboard');
    })();
</script>
</body>
</html>
